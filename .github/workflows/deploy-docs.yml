name: Deploy JupyterBook to GitHub Pages

on:
  push:
    branches:
        - main
        - dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5   # action officielle de l'équipe uv

      - name: Install dependencies
        run: uv sync --all-extras      # installe tout, y compris les groupes optionnels [dev]

      - name: Build the book
        run: uv run jupyter book build --all docs/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/_build/html